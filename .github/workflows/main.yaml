name: ci
"on":
  push:
    branches:
      - '**'
jobs:
  test_cue_module:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v4
        with:
          just-version: 1.51.0
      - uses: cachix/install-nix-action@v30
      - name: run tests
        run: just test
